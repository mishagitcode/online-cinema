services:
  api:
    build: .
    command: uvicorn online_cinema.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
      - mailpit

  celery-worker:
    build: .
    command: celery -A online_cinema.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    command: celery -A online_cinema.core.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: online_cinema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
